<h2 class="sr-only">Mockup of the Adventure tab redesigned as a winding world map with regions, lesson nodes, a guardian battle, and a tail-collection counter</h2>
<div style="background: var(--surface-1); border-radius: 12px; padding: 1.25rem; position: relative;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <i class="ti ti-map-2" style="font-size: 20px; color: var(--text-accent);" aria-hidden="true"></i>
      <span style="font-size: 15px; font-weight: 500;">Bosque de verbos</span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 999px; padding: 4px 12px;">
      <i class="ti ti-star" style="font-size: 15px; color: var(--text-warning);" aria-hidden="true"></i>
      <span style="font-size: 13px; font-weight: 500;">3 / 9 tails</span>
    </div>
  </div>

  <div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <i class="ti ti-clipboard-list" style="font-size: 17px; color: var(--text-secondary);" aria-hidden="true"></i>
      <span style="font-size: 13px; color: var(--text-secondary);">Daily quest: finish 2 lessons today</span>
    </div>
    <span style="font-size: 12px; font-weight: 500; color: var(--text-accent);">+30 KC</span>
  </div>

  <svg viewBox="0 0 640 220" style="width: 100%; height: auto;" role="img" aria-label="Winding trail of lesson nodes leading to a guardian battle">
    <path d="M 30 180 Q 120 60 220 140 T 400 90 Q 470 50 540 100" fill="none" stroke="var(--border-strong)" stroke-width="3" stroke-dasharray="2 10" stroke-linecap="round"/>
    <g>
      <circle cx="30" cy="180" r="16" fill="var(--fill-success)"/>
      <path d="M 24 180 l 4 5 l 9 -10" stroke="var(--on-success)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g>
      <circle cx="130" cy="110" r="16" fill="var(--fill-success)"/>
      <path d="M 124 110 l 4 5 l 9 -10" stroke="var(--on-success)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g>
      <circle cx="240" cy="150" r="18" fill="var(--fill-accent)"/>
      <circle cx="240" cy="150" r="24" fill="none" stroke="var(--border-accent)" stroke-width="2"/>
      <text x="240" y="156" text-anchor="middle" font-size="14" fill="var(--on-accent)">3</text>
    </g>
    <g opacity="0.45">
      <circle cx="340" cy="100" r="16" fill="var(--fill-secondary)" stroke="var(--border)" stroke-width="1"/>
      <text x="340" y="106" text-anchor="middle" font-size="13" fill="var(--text-muted)">4</text>
    </g>
    <g opacity="0.45">
      <circle cx="440" cy="80" r="16" fill="var(--fill-secondary)" stroke="var(--border)" stroke-width="1"/>
      <text x="440" y="86" text-anchor="middle" font-size="13" fill="var(--text-muted)">5</text>
    </g>
    <g opacity="0.4">
      <rect x="510" y="72" width="56" height="56" rx="12" fill="var(--bg-pro)"/>
      <i></i>
      <text x="538" y="106" text-anchor="middle" font-size="24" fill="var(--text-pro)">&#9889;</text>
    </g>
  </svg>

  <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
    <span style="font-size: 12px; color: var(--text-muted);">Node 3 in progress</span>
    <span style="font-size: 12px; color: var(--text-muted);">Guardian battle locked until node 5</span>
  </div>
</div>
